<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="dashboard-shell">
      <nav class="topbar">
        <div>
          <h2>Simple UI Flask</h2>
          <p>Welcome, {{ username }}</p>
        </div>
        <div class="nav-links">
          <a class="active" href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('logs') }}">Logs</a>
          <a href="{{ url_for('logout') }}">Logout</a>
        </div>
      </nav>

      <main class="dashboard-content">
        <section class="hero-card">
          <h1>System overview</h1>
          <p>Your portal is up and running. Review recent activity and check logs in one place.</p>
          <a class="primary-btn" href="{{ url_for('logs') }}">View logs</a>
        </section>

        <section class="stats-grid">
          <article class="stat-card">
            <h3>Services</h3>
            <p class="metric">12</p>
            <span>Healthy services</span>
          </article>
          <article class="stat-card">
            <h3>Alerts</h3>
            <p class="metric">3</p>
            <span>Pending incidents</span>
          </article>
          <article class="stat-card">
            <h3>Sessions</h3>
            <p class="metric">8</p>
            <span>Active users</span>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
